services:

  nginx:
    image: nginx:latest
    container_name: ranjay-nginx
    ports:
      - "8080:80"
    networks:
      - ranjay-network
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: ranjay-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ranjay123
      MYSQL_DATABASE: ranjaytestdb
      MYSQL_USER: ranjay
      MYSQL_PASSWORD: ranjay123
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ranjay-network

volumes:
  mysql-data:

networks:
  ranjay-network:
    driver: bridge